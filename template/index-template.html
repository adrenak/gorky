<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="{{BASE_HREF}}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{META_DESCRIPTION}}" id="meta-description">
    <meta name="keywords" content="{{META_KEYWORDS}}" id="meta-keywords">
    <link rel="canonical" href="{{CANONICAL_URL}}" id="canonical-link">
    <title id="page-title">{{PAGE_TITLE}}</title>
    {{STRUCTURED_DATA}}
    {{LEGACY_REDIRECT}}
    <link rel="icon" type="image/x-icon" href="favicon.ico" id="favicon-link">
    <link rel="apple-touch-icon" href="apple-touch-icon.png" id="apple-touch-icon-link">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/navigation.css">
    <link rel="stylesheet" href="styles/mobile.css">
    <link rel="stylesheet" href="styles/content.css">
    <link rel="stylesheet" href="styles/responsive.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
</head>
<body>
    <div class="container">
        <button class="hamburger-menu" id="hamburger-menu" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-body">
                <div class="sidebar-header">
                    {{SIDEBAR_HEADER}}
                </div>
                <nav class="sidebar-main-nav">
                    {{MAIN_NAV}}
                </nav>
                <nav class="sidebar-nav">
                    {{SIDEBAR_NAV}}
                </nav>
            </div>
            {{SIDEBAR_FOOTER}}
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <div id="markdown-content"{{TAG_FILTER_ATTR}}>
                {{POST_METADATA}}
                {{MARKDOWN_CONTENT}}
            </div>
        </main>
    </div>

    <script>
        const SITE_CONFIG = {{SITE_CONFIG}};

        document.addEventListener('DOMContentLoaded', function () {
            if (window.Prism) {
                Prism.highlightAll();
            }

            if (SITE_CONFIG.favicon) {
                const faviconLink = document.getElementById('favicon-link');
                if (faviconLink) {
                    faviconLink.setAttribute('href', SITE_CONFIG.favicon);
                }
            }
            if (SITE_CONFIG.appleTouchIcon) {
                const appleIconLink = document.getElementById('apple-touch-icon-link');
                if (appleIconLink) {
                    appleIconLink.setAttribute('href', SITE_CONFIG.appleTouchIcon);
                }
            }

            const markdownContent = document.getElementById('markdown-content');
            if (markdownContent && markdownContent.hasAttribute('data-enable-tag-filter')) {
                const tagParam = new URLSearchParams(window.location.search).get('tag');
                if (tagParam) {
                    const normalizedTag = tagParam.toLowerCase();
                    const entries = markdownContent.querySelectorAll('.post-entry[data-tags]');
                    let visibleCount = 0;

                    entries.forEach(function (entry) {
                        const tags = (entry.getAttribute('data-tags') || '')
                            .split(',')
                            .map(function (tag) { return tag.trim().toLowerCase(); });
                        const matches = tags.includes(normalizedTag);
                        entry.style.display = matches ? '' : 'none';
                        if (matches) visibleCount += 1;
                    });

                    if (visibleCount === 0) {
                        const notice = document.createElement('p');
                        notice.textContent = 'No posts found for tag "' + tagParam + '".';
                        markdownContent.appendChild(notice);
                    }
                }
            }

            const hamburgerMenu = document.getElementById('hamburger-menu');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            function toggleSidebar() {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
                hamburgerMenu.classList.toggle('active');
            }

            function closeSidebar() {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
                hamburgerMenu.classList.remove('active');
            }

            if (hamburgerMenu) {
                hamburgerMenu.addEventListener('click', toggleSidebar);
            }
            if (overlay) {
                overlay.addEventListener('click', closeSidebar);
            }

            document.querySelectorAll('.nav-link').forEach(function (link) {
                link.addEventListener('click', closeSidebar);
            });

            if (SITE_CONFIG.goatCounterEnabled && typeof goatcounter !== 'undefined') {
                goatcounter.count({
                    path: location.pathname + location.search
                });
            }
        });
    </script>

    <script>
        if (SITE_CONFIG.goatCounterEnabled) {
            const script = document.createElement('script');
            script.async = true;
            script.setAttribute('data-goatcounter', 'https://' + SITE_CONFIG.goatCounterCode + '.goatcounter.com/count');
            if (SITE_CONFIG.allowLocal) script.setAttribute('data-goatcounter-settings', 'allow_local:true');
            if (SITE_CONFIG.allowFrame) script.setAttribute('data-goatcounter-settings', 'allow_frame:true');
            if (SITE_CONFIG.noOnload) script.setAttribute('data-goatcounter-settings', 'no_onload:true');
            script.src = 'https://gc.zgo.at/count.js';
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
