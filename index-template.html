<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Column Layout</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Vatsal Ambastha</h1>
            </div>
            <nav class="sidebar-nav">
                {{SIDEBAR_NAV}}
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div id="markdown-content">
                {{MARKDOWN_CONTENT}}
            </div>
        </main>
    </div>

    <script>
        // Function to get URL parameter value
        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        // Function to show date and tags for post content
        function showPostMetadata(contentSection) {
            const date = contentSection.getAttribute('data-date');
            const tags = contentSection.getAttribute('data-tags');
            
            if (!date && !tags) return; // No metadata to show
            
            // Check if metadata container already exists
            let metadataContainer = contentSection.querySelector('.post-metadata');
            if (!metadataContainer) {
                // Create metadata container and insert it at the beginning
                metadataContainer = document.createElement('div');
                metadataContainer.className = 'post-metadata';
                metadataContainer.style.cssText = 'color: #666; font-size: 0.9rem; margin-bottom: 1.5rem;';
                contentSection.insertBefore(metadataContainer, contentSection.firstChild);
            }
            
            // Clear existing content
            metadataContainer.innerHTML = '';
            
            // Add date if available
            if (date) {
                const dateElement = document.createElement('div');
                dateElement.className = 'post-date';
                dateElement.style.cssText = 'font-style: italic; margin-bottom: 0.5rem;';
                dateElement.textContent = date;
                metadataContainer.appendChild(dateElement);
            }
            
            // Add tags if available
            if (tags) {
                const tagsElement = document.createElement('div');
                tagsElement.className = 'post-tags';
                tagsElement.style.cssText = 'font-style: italic;';
                tagsElement.textContent = 'Tagged: ' + tags;
                metadataContainer.appendChild(tagsElement);
            }
        }
        
        // Function to show content by slug
        function showContentBySlug(slug) {
            if (!slug) return false;
            
            const contentSection = document.querySelector(`.content-section[data-slug="${slug}"]`);
            if (contentSection) {
                // Hide all content sections
                document.querySelectorAll('.content-section').forEach(section => {
                    section.style.display = 'none';
                });
                
                // Show selected content
                contentSection.style.display = 'block';
                
                // Show date and tags if it's a post
                showPostMetadata(contentSection);
                
                // Highlight syntax in code blocks
                if (window.Prism) {
                    const codeBlocks = contentSection.querySelectorAll('pre code[class*="language-"]');
                    codeBlocks.forEach(block => {
                        Prism.highlightElement(block);
                    });
                }
                
                // Update active state - find nav link that matches this content
                document.querySelectorAll('.nav-link').forEach(nav => {
                    nav.classList.remove('active');
                });
                
                // Try to find and activate the corresponding nav link
                const contentId = contentSection.id;
                const navLink = document.querySelector(`.nav-link[data-content]`);
                if (navLink) {
                    // Find the nav link that points to this content
                    document.querySelectorAll('.nav-link[data-content]').forEach(link => {
                        const targetContent = link.getAttribute('data-content');
                        const targetId = 'content-' + targetContent.replace(/\./g, '-');
                        if (targetId === contentId) {
                            link.classList.add('active');
                        }
                    });
                }
                
                return true;
            }
            return false;
        }
        
        // Function to show content by file path
        function showContentByFile(filePath) {
            const contentId = 'content-' + filePath.replace(/\./g, '-');
            const contentSection = document.getElementById(contentId);
            
            if (contentSection) {
                // Hide all content sections
                document.querySelectorAll('.content-section').forEach(section => {
                    section.style.display = 'none';
                });
                
                // Show selected content
                contentSection.style.display = 'block';
                
                // Highlight syntax in code blocks
                if (window.Prism) {
                    const codeBlocks = contentSection.querySelectorAll('pre code[class*="language-"]');
                    codeBlocks.forEach(block => {
                        Prism.highlightElement(block);
                    });
                }
                
                // Update active state
                document.querySelectorAll('.nav-link').forEach(nav => {
                    nav.classList.remove('active');
                });
                
                // Activate the corresponding nav link
                document.querySelectorAll('.nav-link[data-content]').forEach(link => {
                    const targetContent = link.getAttribute('data-content');
                    const targetId = 'content-' + targetContent.replace(/\./g, '-');
                    if (targetId === contentId) {
                        link.classList.add('active');
                    }
                });
                
                return true;
            }
            return false;
        }
        
        // Function to handle URL changes and update content
        function handleURLChange() {
            // Check for page parameter first (home or posts)
            const pageParam = getURLParameter('page');
            if (pageParam === 'home' || pageParam === 'posts') {
                const targetFile = pageParam + '.md';
                if (showContentByFile(targetFile)) {
                    return; // Successfully showed page
                }
            }
            
            // Check for post slug parameter (individual posts)
            const postSlug = getURLParameter('post');
            if (postSlug) {
                if (showContentBySlug(postSlug)) {
                    return; // Successfully showed post
                }
            }
            
            // Default: show home.md if no parameters
            showContentByFile('home.md');
        }
        
        // Content switching functionality
        document.addEventListener('DOMContentLoaded', function() {
            // Set up nav link click handlers first (always needed)
            const navLinks = document.querySelectorAll('.nav-link[data-content]');
            
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    const targetContent = this.getAttribute('data-content');
                    if (targetContent) {
                        showContentByFile(targetContent);
                        // Update URL without reload
                        const newUrl = window.location.pathname + '?page=' + targetContent.replace('.md', '');
                        window.history.pushState({}, '', newUrl);
                    }
                });
            });
            
            // Handle browser back/forward navigation
            window.addEventListener('popstate', function(event) {
                handleURLChange();
            });
            
            // Initial load - handle URL parameters
            handleURLChange();
            
            // Highlight syntax in initially visible content
            if (window.Prism) {
                Prism.highlightAll();
            }
        });
    </script>
</body>
</html>
