<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Column Layout</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Hamburger Menu Button (mobile/portrait only) -->
        <button class="hamburger-menu" id="hamburger-menu" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        <!-- Left Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>Vatsal Ambastha</h1>
            </div>
            <nav class="sidebar-nav">
                {{SIDEBAR_NAV}}
            </nav>
        </aside>
        
        <!-- Overlay for mobile (closes sidebar when clicked) -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div id="markdown-content">
                {{MARKDOWN_CONTENT}}
            </div>
        </main>
    </div>

    <script>
        // Function to get URL parameter value
        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        // Function to show date and tags for post content
        function showPostMetadata(contentSection) {
            const date = contentSection.getAttribute('data-date');
            const tags = contentSection.getAttribute('data-tags');
            
            if (!date && !tags) return; // No metadata to show
            
            // Check if metadata container already exists
            let metadataContainer = contentSection.querySelector('.post-metadata');
            if (!metadataContainer) {
                // Create metadata container and insert it at the beginning
                metadataContainer = document.createElement('div');
                metadataContainer.className = 'post-metadata';
                metadataContainer.style.cssText = 'color: #666; font-size: 0.9rem; margin-bottom: 1.5rem;';
                contentSection.insertBefore(metadataContainer, contentSection.firstChild);
            }
            
            // Clear existing content
            metadataContainer.innerHTML = '';
            
            // Add date if available
            if (date) {
                const dateElement = document.createElement('div');
                dateElement.className = 'post-date';
                dateElement.style.cssText = 'font-style: italic; margin-bottom: 0.5rem;';
                dateElement.textContent = date;
                metadataContainer.appendChild(dateElement);
            }
            
            // Add tags if available
            if (tags) {
                const tagsElement = document.createElement('div');
                tagsElement.className = 'post-tags';
                tagsElement.style.cssText = 'font-style: italic;';
                
                // Split tags by comma and create clickable links
                const tagList = tags.split(',').map(t => t.trim());
                const tagText = document.createTextNode('Tagged: ');
                tagsElement.appendChild(tagText);
                
                tagList.forEach((tag, index) => {
                    const tagLink = document.createElement('a');
                    tagLink.href = `?tag=${encodeURIComponent(tag)}`;
                    tagLink.textContent = tag;
                    tagLink.style.cssText = 'color: #0066cc; text-decoration: none; margin-left: 0.25rem;';
                    tagLink.addEventListener('click', function(e) {
                        e.preventDefault();
                        showPostsByTag(tag);
                        window.history.pushState({}, '', `?tag=${encodeURIComponent(tag)}`);
                    });
                    tagLink.addEventListener('mouseenter', function() {
                        this.style.textDecoration = 'underline';
                    });
                    tagLink.addEventListener('mouseleave', function() {
                        this.style.textDecoration = 'none';
                    });
                    tagsElement.appendChild(tagLink);
                    
                    // Add comma separator (except for last tag)
                    if (index < tagList.length - 1) {
                        const comma = document.createTextNode(', ');
                        tagsElement.appendChild(comma);
                    }
                });
                
                metadataContainer.appendChild(tagsElement);
            }
        }
        
        // Function to show content by slug
        function showContentBySlug(slug) {
            if (!slug) return false;
            
            // Hide tag posts list if it exists
            const tagListContainer = document.getElementById('tag-posts-list');
            if (tagListContainer) {
                tagListContainer.style.display = 'none';
            }
            
            const contentSection = document.querySelector(`.content-section[data-slug="${slug}"]`);
            if (contentSection) {
                // Hide all content sections
                document.querySelectorAll('.content-section').forEach(section => {
                    section.style.display = 'none';
                });
                
                // Show selected content
                contentSection.style.display = 'block';
                
                // Show date and tags if it's a post
                showPostMetadata(contentSection);
                
                // Highlight syntax in code blocks
                if (window.Prism) {
                    const codeBlocks = contentSection.querySelectorAll('pre code[class*="language-"]');
                    codeBlocks.forEach(block => {
                        Prism.highlightElement(block);
                    });
                }
                
                // Update active state - find nav link that matches this content
                document.querySelectorAll('.nav-link').forEach(nav => {
                    nav.classList.remove('active');
                });
                
                // Try to find and activate the corresponding nav link
                const contentId = contentSection.id;
                const navLink = document.querySelector(`.nav-link[data-content]`);
                if (navLink) {
                    // Find the nav link that points to this content
                    document.querySelectorAll('.nav-link[data-content]').forEach(link => {
                        const targetContent = link.getAttribute('data-content');
                        const targetId = 'content-' + targetContent.replace(/\./g, '-');
                        if (targetId === contentId) {
                            link.classList.add('active');
                        }
                    });
                }
                
                return true;
            }
            return false;
        }
        
        // Function to show content by file path
        function showContentByFile(filePath) {
            // Hide tag posts list if it exists
            const tagListContainer = document.getElementById('tag-posts-list');
            if (tagListContainer) {
                tagListContainer.style.display = 'none';
            }
            
            const contentId = 'content-' + filePath.replace(/\./g, '-');
            const contentSection = document.getElementById(contentId);
            
            if (contentSection) {
                // Hide all content sections
                document.querySelectorAll('.content-section').forEach(section => {
                    section.style.display = 'none';
                });
                
                // Show selected content
                contentSection.style.display = 'block';
                
                // Highlight syntax in code blocks
                if (window.Prism) {
                    const codeBlocks = contentSection.querySelectorAll('pre code[class*="language-"]');
                    codeBlocks.forEach(block => {
                        Prism.highlightElement(block);
                    });
                }
                
                // Update active state
                document.querySelectorAll('.nav-link').forEach(nav => {
                    nav.classList.remove('active');
                });
                
                // Activate the corresponding nav link
                document.querySelectorAll('.nav-link[data-content]').forEach(link => {
                    const targetContent = link.getAttribute('data-content');
                    const targetId = 'content-' + targetContent.replace(/\./g, '-');
                    if (targetId === contentId) {
                        link.classList.add('active');
                    }
                });
                
                return true;
            }
            return false;
        }
        
        // Function to get title from a post content section
        function getPostTitle(postSection) {
            const h1 = postSection.querySelector('h1');
            if (h1) {
                return h1.textContent;
            }
            // Fallback: try to get from slug or other heading
            const h2 = postSection.querySelector('h2');
            if (h2) {
                return h2.textContent;
            }
            return 'Untitled Post';
        }
        
        // Function to show posts by tag (list view similar to posts.md)
        function showPostsByTag(tag) {
            if (!tag) return false;
            
            // Hide all content sections first (except tag list container)
            document.querySelectorAll('.content-section').forEach(section => {
                // Only hide sections that are not the tag list container
                if (section.id !== 'tag-posts-list') {
                    section.style.display = 'none';
                }
            });
            
            // Find all post content sections (those with data-tags attribute)
            const allPosts = document.querySelectorAll('.content-section[data-tags]');
            const matchingPosts = [];
            
            allPosts.forEach(post => {
                const tags = post.getAttribute('data-tags');
                if (tags) {
                    // Split tags by comma and check if the tag matches (case-insensitive)
                    const tagList = tags.split(',').map(t => t.trim().toLowerCase());
                    if (tagList.includes(tag.toLowerCase())) {
                        const slug = post.getAttribute('data-slug');
                        const title = getPostTitle(post);
                        const date = post.getAttribute('data-date');
                        if (slug && title) {
                            matchingPosts.push({ slug, title, date, post });
                        }
                    }
                }
            });
            
            if (matchingPosts.length > 0) {
                // Create or get the container for the tag-filtered posts list
                let tagListContainer = document.getElementById('tag-posts-list');
                if (!tagListContainer) {
                    tagListContainer = document.createElement('div');
                    tagListContainer.id = 'tag-posts-list';
                    tagListContainer.className = 'content-section';
                    document.getElementById('markdown-content').appendChild(tagListContainer);
                }
                
                // Show the container
                tagListContainer.style.display = 'block';
                
                // Clear and populate the container
                tagListContainer.innerHTML = '';
                
                // Add header
                const header = document.createElement('h1');
                header.textContent = `Posts tagged ${tag}`;
                tagListContainer.appendChild(header);
                
                // Sort posts by date (newest first)
                matchingPosts.sort((a, b) => {
                    if (!a.date || !b.date) return 0;
                    // Parse dates for sorting (format: "25 Sep 2025")
                    const parseDate = (dateStr) => {
                        const months = { 'Jan': 0, 'Feb': 1, 'Mar': 2, 'Apr': 3, 'May': 4, 'Jun': 5,
                                        'Jul': 6, 'Aug': 7, 'Sep': 8, 'Oct': 9, 'Nov': 10, 'Dec': 11 };
                        const parts = dateStr.split(' ');
                        if (parts.length === 3) {
                            const day = parseInt(parts[0], 10);
                            const month = months[parts[1]];
                            const year = parseInt(parts[2], 10);
                            return new Date(year, month, day);
                        }
                        return new Date(0);
                    };
                    return parseDate(b.date) - parseDate(a.date);
                });
                
                // Add post links
                matchingPosts.forEach(({ slug, title }) => {
                    const postLink = document.createElement('h2');
                    const link = document.createElement('a');
                    link.href = `?post=${slug}`;
                    link.textContent = title;
                    link.style.textDecoration = 'none';
                    link.style.color = 'inherit';
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        showContentBySlug(slug);
                        window.history.pushState({}, '', `?post=${slug}`);
                    });
                    postLink.appendChild(link);
                    tagListContainer.appendChild(postLink);
                });
                
                // Update active state - deactivate all nav links
                document.querySelectorAll('.nav-link').forEach(nav => {
                    nav.classList.remove('active');
                });
                
                return true;
            }
            
            return false;
        }
        
        // Function to handle URL changes and update content
        function handleURLChange() {
            // Check for tag parameter first (filter posts by tag)
            const tagParam = getURLParameter('tag');
            if (tagParam) {
                if (showPostsByTag(tagParam)) {
                    return; // Successfully showed posts by tag
                }
            }
            
            // Check for page parameter (home or posts)
            const pageParam = getURLParameter('page');
            if (pageParam === 'home' || pageParam === 'posts') {
                const targetFile = pageParam + '.md';
                if (showContentByFile(targetFile)) {
                    return; // Successfully showed page
                }
            }
            
            // Check for post slug parameter (individual posts)
            const postSlug = getURLParameter('post');
            if (postSlug) {
                if (showContentBySlug(postSlug)) {
                    return; // Successfully showed post
                }
            }
            
            // Default: show home.md if no parameters
            showContentByFile('home.md');
        }
        
        // Content switching functionality
        document.addEventListener('DOMContentLoaded', function() {
            // Set up nav link click handlers first (always needed)
            const navLinks = document.querySelectorAll('.nav-link[data-content]');
            
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    const targetContent = this.getAttribute('data-content');
                    if (targetContent) {
                        showContentByFile(targetContent);
                        // Update URL without reload
                        const newUrl = window.location.pathname + '?page=' + targetContent.replace('.md', '');
                        window.history.pushState({}, '', newUrl);
                    }
                });
            });
            
            // Handle browser back/forward navigation
            window.addEventListener('popstate', function(event) {
                handleURLChange();
            });
            
            // Initial load - handle URL parameters
            handleURLChange();
            
            // Highlight syntax in initially visible content
            if (window.Prism) {
                Prism.highlightAll();
            }
            
            // Hamburger menu toggle functionality
            const hamburgerMenu = document.getElementById('hamburger-menu');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            function toggleSidebar() {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
                hamburgerMenu.classList.toggle('active');
            }
            
            function closeSidebar() {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
                hamburgerMenu.classList.remove('active');
            }
            
            if (hamburgerMenu) {
                hamburgerMenu.addEventListener('click', toggleSidebar);
            }
            
            if (overlay) {
                overlay.addEventListener('click', closeSidebar);
            }
            
            // Close sidebar when clicking on a nav link (mobile)
            const mobileNavLinks = document.querySelectorAll('.nav-link');
            mobileNavLinks.forEach(link => {
                link.addEventListener('click', function() {
                    // Check if we're in mobile/portrait mode
                    if (window.matchMedia('(max-aspect-ratio: 1/1)').matches) {
                        closeSidebar();
                    }
                });
            });
        });
    </script>
</body>
</html>
