<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Column Layout</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Vatsal Ambastha</h1>
            </div>
            <nav class="sidebar-nav">
                {{SIDEBAR_NAV}}
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div id="markdown-content">
                {{MARKDOWN_CONTENT}}
            </div>
        </main>
    </div>

    <script>
        // Function to get URL parameter value
        function getURLParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        // Function to show content by slug
        function showContentBySlug(slug) {
            if (!slug) return false;
            
            const contentSection = document.querySelector(`.content-section[data-slug="${slug}"]`);
            if (contentSection) {
                // Hide all content sections
                document.querySelectorAll('.content-section').forEach(section => {
                    section.style.display = 'none';
                });
                
                // Show selected content
                contentSection.style.display = 'block';
                
                // Update active state - find nav link that matches this content
                document.querySelectorAll('.nav-link').forEach(nav => {
                    nav.classList.remove('active');
                });
                
                // Try to find and activate the corresponding nav link
                const contentId = contentSection.id;
                const navLink = document.querySelector(`.nav-link[data-content]`);
                if (navLink) {
                    // Find the nav link that points to this content
                    document.querySelectorAll('.nav-link[data-content]').forEach(link => {
                        const targetContent = link.getAttribute('data-content');
                        const targetId = 'content-' + targetContent.replace(/\./g, '-');
                        if (targetId === contentId) {
                            link.classList.add('active');
                        }
                    });
                }
                
                return true;
            }
            return false;
        }
        
        // Function to show content by file path
        function showContentByFile(filePath) {
            const contentId = 'content-' + filePath.replace(/\./g, '-');
            const contentSection = document.getElementById(contentId);
            
            if (contentSection) {
                // Hide all content sections
                document.querySelectorAll('.content-section').forEach(section => {
                    section.style.display = 'none';
                });
                
                // Show selected content
                contentSection.style.display = 'block';
                
                // Update active state
                document.querySelectorAll('.nav-link').forEach(nav => {
                    nav.classList.remove('active');
                });
                
                // Activate the corresponding nav link
                document.querySelectorAll('.nav-link[data-content]').forEach(link => {
                    const targetContent = link.getAttribute('data-content');
                    const targetId = 'content-' + targetContent.replace(/\./g, '-');
                    if (targetId === contentId) {
                        link.classList.add('active');
                    }
                });
                
                return true;
            }
            return false;
        }
        
        // Content switching functionality
        document.addEventListener('DOMContentLoaded', function() {
            // Check for URL parameter first
            const postSlug = getURLParameter('post');
            if (postSlug) {
                if (showContentBySlug(postSlug)) {
                    return; // Successfully showed post, exit early
                }
                // If slug not found, fall through to default behavior
            }
            
            // Set up nav link click handlers
            const navLinks = document.querySelectorAll('.nav-link[data-content]');
            
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    const targetContent = this.getAttribute('data-content');
                    showContentByFile(targetContent);
                });
            });
        });
    </script>
</body>
</html>
