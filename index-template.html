<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Column Layout</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Vatsal Ambastha</h1>
            </div>
            <nav class="sidebar-nav">
                {{SIDEBAR_NAV}}
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div id="markdown-content">
                {{MARKDOWN_CONTENT}}
            </div>
        </main>
    </div>

    <script>
        // Content switching functionality
        document.addEventListener('DOMContentLoaded', function() {
            const navLinks = document.querySelectorAll('.nav-link[data-content]');
            
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    const targetContent = this.getAttribute('data-content');
                    const contentId = 'content-' + targetContent.replace(/\./g, '-');
                    const contentSection = document.getElementById(contentId);
                    
                    if (contentSection) {
                        // Hide all content sections
                        document.querySelectorAll('.content-section').forEach(section => {
                            section.style.display = 'none';
                        });
                        
                        // Show selected content
                        contentSection.style.display = 'block';
                        
                        // Update active state
                        document.querySelectorAll('.nav-link').forEach(nav => {
                            nav.classList.remove('active');
                        });
                        this.classList.add('active');
                    }
                });
            });
            
            // Handle Home link (default content) - now also has data-content attribute
            const homeLink = document.querySelector('.nav-link[data-content="home.md"]');
            if (homeLink) {
                // Same handler as other content links, but ensure it's set up
            }
        });
    </script>
</body>
</html>
